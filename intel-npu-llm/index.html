<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intel NPU LLM - Quick Test</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-color: #f8fafc;
            --primary-color: #38bdf8;
            --secondary-color: #64748b;
            --accent-color: #f43f5e;
            --input-bg: #334155;
        }
        body {
            font-family: 'Inter', -apple-system, blinkmacsystemfont, 'Segoe UI', roboto, oxygen, ubuntu, cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            padding: 1rem 2rem;
            background-color: var(--container-bg);
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 { margin: 0; font-size: 1.25rem; color: var(--primary-color); }
        .status-container { display: flex; gap: 1rem; font-size: 0.875rem; color: var(--secondary-color); }
        .status-pill { background: #334155; padding: 4px 12px; border-radius: 12px; display: flex; align-items: center; gap: 8px; font-weight: 500; min-width: 100px; transition: all 0.3s ease; }
        .status-active { color: #4ade80; border: 1px solid rgba(74, 222, 128, 0.3); }
        .status-busy { color: #fbbf24; border: 1px solid rgba(251, 191, 36, 0.3); box-shadow: 0 0 10px rgba(251, 191, 36, 0.2); }
        .pulse {
            width: 8px; height: 8px; border-radius: 50%; background-color: currentColor;
            display: none;
        }
        .status-busy .pulse {
            display: block;
            animation: pulse-animation 1.5s infinite;
        }
        @keyframes pulse-animation {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(251, 191, 36, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); }
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .message {
            max-width: 80%;
            padding: 0.75rem 1rem;
            border-radius: 1rem;
            line-height: 1.5;
        }
        .user-message {
            align-self: flex-end;
            background-color: var(--primary-color);
            color: #0f172a;
            border-bottom-right-radius: 0.25rem;
        }
        .ai-message {
            align-self: flex-start;
            background-color: var(--input-bg);
            border-bottom-left-radius: 0.25rem;
        }
        .loading { font-style: italic; color: var(--secondary-color); }

        footer {
            padding: 1rem 2rem;
            background-color: var(--container-bg);
            border-top: 1px solid #334155;
        }
        .input-group {
            display: flex;
            gap: 0.5rem;
            max-width: 1000px;
            margin: 0 auto;
        }
        select, input {
            background-color: var(--input-bg);
            border: 1px solid #475569;
            color: white;
            padding: 0.75rem;
            border-radius: 0.5rem;
            outline: none;
        }
        input { flex: 1; }
        button {
            background-color: var(--primary-color);
            color: #0f172a;
            border: none;
            padding: 0 1.5rem;
            border-radius: 0.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        button:hover:not(:disabled) { opacity: 0.9; }
    </style>
</head>
<body>
    <header>
        <h1>Intel NPU LLM Server</h1>
        <div class="status-container">
            <div class="status-pill">Memory: <span id="mem-status">--</span></div>
            <div class="status-pill">NPU: <span id="npu-status">--</span></div>
            <select id="model-select"></select>
        </div>
    </header>

    <div id="chat-container">
        <div class="message ai-message">Hello! I'm running on your Intel NPU. How can I help you today?</div>
    </div>

    <footer>
        <form id="chat-form" class="input-group">
            <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off">
            <button type="submit" id="send-btn">Send</button>
        </form>
    </footer>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const modelSelect = document.getElementById('model-select');
        const memStatus = document.getElementById('mem-status');
        const npuStatus = document.getElementById('npu-status');

        let isGenerating = false;

        async function updateStatus() {
            try {
                const res = await fetch('/v1/system/status');
                const data = await res.json();
                memStatus.textContent = `${data.memory.used_percent}% used`;
                
                const isBusy = data.npu.busy;
                npuStatus.innerHTML = `<div class="pulse"></div> NPU: ${isBusy ? 'Busy' : 'Idle'}`;
                npuStatus.className = 'status-pill ' + (isBusy ? 'status-busy' : 'status-active');
                
                if (modelSelect.options.length === 0 && data.models.loaded.length > 0) {
                    data.models.loaded.forEach(m => {
                        const opt = document.createElement('option');
                        opt.value = m;
                        opt.textContent = m;
                        modelSelect.appendChild(opt);
                    });
                }
            } catch (e) { 
                console.error("Status check failed", e);
                npuStatus.textContent = "Offline";
                npuStatus.className = 'status-pill';
            }
        }

        setInterval(updateStatus, 1000);
        updateStatus();

        function addMessage(role, content) {
            const div = document.createElement('div');
            div.className = `message ${role}-message`;
            div.textContent = content;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return div;
        }

        chatForm.onsubmit = async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text || isGenerating) return;

            addMessage('user', text);
            userInput.value = '';
            
            isGenerating = true;
            sendBtn.disabled = true;
            
            const aiMsgDiv = addMessage('ai', '...');
            aiMsgDiv.classList.add('loading');
            
            try {
                const response = await fetch('/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: modelSelect.value,
                        messages: [{ role: 'user', content: text }],
                        stream: true
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullText = '';
                aiMsgDiv.textContent = '';
                aiMsgDiv.classList.remove('loading');

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ') && line !== 'data: [DONE]') {
                            try {
                                const data = JSON.parse(line.substring(6));
                                const content = data.choices[0]?.delta?.content || '';
                                fullText += content;
                                aiMsgDiv.textContent = fullText;
                                chatContainer.scrollTop = chatContainer.scrollHeight;
                            } catch (e) {}
                        }
                    }
                }
            } catch (e) {
                aiMsgDiv.textContent = "Error: " + e.message;
            } finally {
                isGenerating = false;
                sendBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
